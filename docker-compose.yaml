# Hostinger VPS: Traefik (host) + Let's Encrypt — siehe Projekt "traefik" auf dem VPS.
services:
  maennertag:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      # Öffentliche HTTPS-URL (Punycode = IDN männertag.site)
      - PUBLIC_BASE_URL=https://xn--mnnertag-0za.site
    labels:
      - traefik.enable=true
      # Nur Apex — LE muss jeden Host in der Regel per DNS auflösen; www-CNAME war zeitweise NXDOMAIN.
      - traefik.http.routers.maennertag.rule=Host(`xn--mnnertag-0za.site`)
      - traefik.http.routers.maennertag.entrypoints=websecure
      - traefik.http.routers.maennertag.tls.certresolver=letsencrypt
      - traefik.http.services.maennertag.loadbalancer.server.port=3000
