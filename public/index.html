<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Männertag — Side-Scroller</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Special+Elite&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: #1a0f08;
      color: #fef3d4;
      font-family: 'Special Elite', monospace;
    }

    /* === Lobby === */
    #lobby {
      position: fixed; inset: 0;
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 4rem;
      align-items: center;
      padding: 4rem 5rem;
      background:
        radial-gradient(ellipse at 30% 20%, rgba(244,200,66,0.12), transparent 50%),
        radial-gradient(ellipse at 70% 80%, rgba(109,191,71,0.08), transparent 50%),
        repeating-linear-gradient(45deg, rgba(0,0,0,0.04) 0 2px, transparent 2px 8px),
        #1a0f08;
    }
    #lobby h1 {
      font-family: 'Bungee', sans-serif;
      font-size: clamp(3rem, 7vw, 6rem);
      color: #f4c842;
      letter-spacing: 0.03em;
      line-height: 1;
      text-shadow:
        4px 4px 0 #6b2e0c,
        8px 8px 0 #3d1a06;
    }
    #lobby h2 {
      font-family: 'Bungee', sans-serif;
      font-size: 1.5rem;
      color: #d99a1f;
      margin-top: 0.75rem;
      letter-spacing: 0.05em;
    }
    .tagline {
      margin-top: 2rem;
      font-size: 1.1rem;
      color: #fef3d4;
      opacity: 0.7;
      line-height: 1.6;
      max-width: 36ch;
    }

    #players-list {
      margin-top: 3rem;
      display: flex; flex-wrap: wrap;
      gap: 0.75rem;
      min-height: 5rem;
    }
    .player-tag {
      padding: 0.6rem 1.2rem;
      border: 3px solid var(--c, #f4c842);
      background: rgba(0,0,0,0.4);
      color: #fef3d4;
      font-family: 'Bungee', sans-serif;
      font-size: 1rem;
      letter-spacing: 0.05em;
      animation: pop-in 0.3s ease-out;
      display: flex;
      align-items: center;
      gap: 0.7rem;
    }
    .player-tag-avatar {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      width: 40px; height: auto;
    }
    @keyframes pop-in {
      from { transform: scale(0.7); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    .empty-hint {
      color: #6b2e0c;
      font-style: italic;
      font-size: 1.1rem;
    }

    #start-btn {
      margin-top: 2.5rem;
      padding: 1.2rem 3rem;
      font-size: 1.4rem;
      font-family: 'Bungee', sans-serif;
      letter-spacing: 0.15em;
      background: #f4c842;
      color: #1a0f08;
      border: none;
      border-bottom: 8px solid #6b2e0c;
      cursor: pointer;
      transition: all 0.1s;
    }
    #start-btn:hover:not(:disabled) {
      background: #fef3d4;
    }
    #start-btn:active:not(:disabled) {
      transform: translateY(4px);
      border-bottom-width: 4px;
    }
    #start-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    #qr-section {
      text-align: center;
    }
    #qr-section h3 {
      font-family: 'Bungee', sans-serif;
      font-size: 1.2rem;
      color: #d99a1f;
      letter-spacing: 0.1em;
      margin-bottom: 1.5rem;
    }
    #qr-img {
      width: min(380px, 30vw);
      height: min(380px, 30vw);
      border: 8px solid #f4c842;
      box-shadow: 8px 8px 0 #6b2e0c;
      background: #fef3d4;
      padding: 12px;
      display: block;
      margin: 0 auto;
    }
    #url {
      margin-top: 1.5rem;
      font-family: 'Special Elite', monospace;
      color: #d99a1f;
      font-size: 1rem;
      letter-spacing: 0.05em;
    }

    /* === Game === */
    #game-container {
      position: fixed; inset: 0;
      display: none;
      background: #87ceeb;
    }
    #game-container.active { display: block; }

    @media (max-width: 1024px) {
      #lobby { grid-template-columns: 1fr; padding: 2rem; gap: 2rem; }
    }
  </style>
</head>
<body>
  <div id="lobby">
    <div>
      <h1>MÄNNERTAG</h1>
      <h2>Die Bier-, Wein- &amp; Paddel-Saga</h2>
      <p class="tagline">
        Sieben Freunde, drei Level, unzählige Schlucke. Scanne den QR-Code mit dem Handy und tritt der Crew bei.
      </p>
      <div id="players-list">
        <span class="empty-hint">Warte auf Spieler …</span>
      </div>
      <button id="start-btn" disabled>SPIEL STARTEN</button>
    </div>
    <div id="qr-section">
      <h3>📱 SCAN MICH</h3>
      <img id="qr-img" alt="QR Code zum Beitreten" />
      <div id="url">…</div>
    </div>
  </div>

  <div id="game-container"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
  <script src="js/pixelchars.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
